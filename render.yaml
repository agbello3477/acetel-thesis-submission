services:
  # 1. Backend Service (Web Service)
  - type: web
    name: atss-backend
    runtime: node
    rootDir: backend
    plan: free # Can be changed to 'pro' or others
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Provide your existing Render DB URL, or a URL from Supabase/Neon
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: MINIO_ENDPOINT
        sync: false # User will provide external S3 endpoint
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET_NAME
        sync: false
      - key: MINIO_USE_SSL
        value: "true"

  # 2. Frontend Service (Static Site)
  - type: web
    name: atss-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: atss-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html


